<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wanderers' Diary | FXEC '26</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Outfit', 'sans-serif'] }, colors: { brandBlue: '#3b82f6', brandPink: '#ff007f' } } } }</script>
    <style>
        body { background-color: #f8fafc; cursor: none; overflow-x: hidden;}
        .cursor-dot { width: 10px; height: 10px; background: #ff007f; position: fixed; border-radius: 50%; pointer-events: none; z-index: 999999; transform: translate(-50%, -50%); transition: transform 0.1s; }
        .cursor-ring { width: 40px; height: 40px; border: 2px solid #3b82f6; position: fixed; border-radius: 50%; pointer-events: none; z-index: 999998; transform: translate(-50%, -50%); transition: width 0.3s, height 0.3s, border-color 0.3s; }
        .trip-card { background: white; border-radius: 1.5rem; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); transition: transform 0.3s; cursor: pointer; position: relative;}
        .trip-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(59, 130, 246, 0.15); }
        #upload-modal { display: none; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="antialiased text-slate-800">

    <div id="lightbox" class="fixed inset-0 z-[2000] bg-slate-900/95 backdrop-blur-sm hidden flex-col items-center justify-center opacity-0 transition-opacity duration-300">
        <button onclick="closeLightbox()" class="absolute top-6 right-6 text-white font-black text-2xl bg-slate-800 rounded-full w-12 h-12 hover:bg-brandPink transition interactive-btn z-50">✕</button>
        <div id="lightbox-content" class="transition-transform transform scale-95 flex items-center justify-center w-full h-full"></div>
    </div>

    <div class="cursor-dot"></div><div class="cursor-ring"></div>

    <nav class="fixed top-0 w-full z-50 px-6 py-6 flex justify-between items-center pointer-events-none">
        <a href="index.html" class="pointer-events-auto bg-white/90 backdrop-blur-md text-slate-900 font-bold px-6 py-3 rounded-full shadow-lg hover:scale-105 transition interactive-btn">← HUB</a>
        <button onclick="toggleModal(true)" class="pointer-events-auto bg-slate-900 text-white font-black px-6 py-3 rounded-full shadow-lg hover:bg-brandPink transition interactive-btn">+ LOG A TRIP</button>
    </nav>

    <main class="pt-32 pb-20 px-6 max-w-7xl mx-auto min-h-screen">
        <div class="text-center mb-16" data-aos="fade-down">
            <h1 class="text-5xl md:text-7xl font-black mb-4">Wanderers' <span class="text-transparent bg-clip-text bg-gradient-to-r from-brandPink to-orange-500">Diary</span> 🎒</h1>
            <p class="text-xl text-slate-500">Upload your travel photos and bus vibes videos!</p>
        </div>

        <div id="loading-msg" class="text-center text-slate-400 font-bold animate-pulse mb-8">Loading travel logs... 🚌</div>

        <div id="trips-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <div id="upload-modal" class="fixed inset-0 z-[100] flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-3xl w-full max-w-md relative shadow-2xl">
            <button onclick="toggleModal(false)" class="absolute top-6 right-6 text-slate-400 font-black hover:text-brandPink interactive-btn text-xl">✕</button>
            <h2 class="text-2xl font-black mb-6">Log a New Trip 🗺️</h2>
            <form id="trip-form" class="space-y-4">
                <input type="text" id="t-place" placeholder="Where did we go? (Optional)" class="w-full bg-slate-50 px-5 py-3 rounded-xl border border-slate-200 outline-none font-bold interactive-btn">
                <textarea id="t-desc" placeholder="What happened there? (Optional)" class="w-full bg-slate-50 px-5 py-3 rounded-xl border border-slate-200 outline-none font-medium h-24 resize-none interactive-btn"></textarea>
                <label class="block w-full border-2 border-dashed border-slate-300 rounded-xl p-6 text-center cursor-pointer hover:border-brandPink transition interactive-btn">
                    <span id="t-file-name" class="text-slate-400 font-bold text-sm">Upload Photo/Video (Max 10MB)</span>
                    <input type="file" id="t-photo" class="hidden" accept="image/*,video/*" required onchange="document.getElementById('t-file-name').innerText = '✅ ' + this.files[0].name">
                </label>
                <button type="submit" id="t-submit-btn" class="w-full bg-brandPink text-white font-black py-4 rounded-xl hover:bg-slate-900 transition interactive-btn">PUBLISH TRIP</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, remove } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB8gwq9lzD7YfYkc5RGFXYRD7ChCVlzmhs",
            authDomain: "fxec-batch-26.firebaseapp.com",
            databaseURL: "https://fxec-batch-26-default-rtdb.firebaseio.com",
            projectId: "fxec-batch-26"
        };
        const app = initializeApp(firebaseConfig); const db = getDatabase(app); const tripsRef = ref(db, 'trips');

        let myDeviceId = localStorage.getItem('fxec_device_id');
        if (!myDeviceId) { myDeviceId = 'student_' + Math.random().toString(36).substr(2, 9); localStorage.setItem('fxec_device_id', myDeviceId); }

        window.toggleModal = function(show) { document.getElementById('upload-modal').style.display = show ? 'flex' : 'none'; }
        
        window.openLightbox = function(src) {
            const lb = document.getElementById('lightbox'); const content = document.getElementById('lightbox-content');
            if(src.includes('data:video')) { content.innerHTML = `<video src="${src}" controls autoplay class="max-w-[90%] max-h-[85vh] rounded-xl shadow-2xl"></video>`; } 
            else { content.innerHTML = `<img src="${src}" class="max-w-[90%] max-h-[85vh] object-contain rounded-xl shadow-2xl">`; }
            lb.style.display = 'flex'; setTimeout(() => { lb.classList.remove('opacity-0'); content.classList.remove('scale-95'); }, 10);
        }
        window.closeLightbox = function() {
            const lb = document.getElementById('lightbox'); const content = document.getElementById('lightbox-content');
            lb.classList.add('opacity-0'); content.classList.add('scale-95'); setTimeout(() => { lb.style.display = 'none'; content.innerHTML=''; }, 300);
        }
        window.deleteCloudData = async function(id) { if(confirm("Are you sure you want to delete this trip log?")) { try { await remove(ref(db, `trips/${id}`)); const el = document.getElementById(`item-${id}`); if(el) el.remove(); } catch(e) { alert("Failed to delete."); } } }

        const dot = document.querySelector('.cursor-dot'); const ring = document.querySelector('.cursor-ring');
        document.addEventListener('mousemove', (e) => { dot.style.left = e.clientX + 'px'; dot.style.top = e.clientY + 'px'; setTimeout(() => { ring.style.left = e.clientX + 'px'; ring.style.top = e.clientY + 'px'; }, 50); });

        document.getElementById('trip-form').addEventListener('submit', async (e) => {
            e.preventDefault(); const btn = document.getElementById('t-submit-btn'); const file = document.getElementById('t-photo').files[0];
            if(file.size > 10000000) return alert("File too large! Max 10MB limit.");
            btn.innerText = "PACKING BAGS... ⏳"; btn.classList.add('opacity-50', 'pointer-events-none');
            const reader = new FileReader();
            reader.onload = async (ev) => {
                try {
                    await push(tripsRef, { place: document.getElementById('t-place').value.trim() || "Batch Trip", desc: document.getElementById('t-desc').value.trim() || "No description provided, just pure vibes! 🚌💨", image: ev.target.result, userId: myDeviceId, timestamp: Date.now() });
                    document.getElementById('trip-form').reset(); document.getElementById('t-file-name').innerText = "Upload Photo/Video (Max 10MB)"; toggleModal(false);
                } catch(err) { alert("Failed to log trip!"); } finally { btn.innerText = "PUBLISH TRIP"; btn.classList.remove('opacity-50', 'pointer-events-none'); }
            }; reader.readAsDataURL(file);
        });

        onChildAdded(tripsRef, (snapshot) => {
            document.getElementById('loading-msg').style.display = 'none';
            const data = snapshot.val(); const grid = document.getElementById('trips-grid');
            const dateStr = new Date(data.timestamp).toLocaleDateString('en-GB', { month: 'short', year: 'numeric' });
            const isMine = data.userId === myDeviceId;
            const delBtn = isMine ? `<button onclick="event.stopPropagation(); window.deleteCloudData('${snapshot.key}')" class="absolute top-4 right-4 bg-red-500/90 text-white w-10 h-10 rounded-full flex items-center justify-center z-50 hover:bg-red-600 transition shadow-lg text-lg">🗑️</button>` : '';

            const mediaHtml = data.image.includes('data:video') ? `<video src="${data.image}" autoplay loop muted playsinline class="w-full h-64 object-cover"></video><div class="absolute top-3 left-3 bg-black/50 text-white p-2 rounded-full text-xs z-50">🎥</div>` : `<img src="${data.image}" class="w-full h-64 object-cover" loading="lazy">`;

            const card = document.createElement('div');
            card.id = `item-${snapshot.key}`; card.className = "trip-card flex flex-col interactive-btn";
            card.setAttribute('onclick', `openLightbox('${data.image}')`);
            card.innerHTML = `${delBtn}${mediaHtml}<div class="p-6 flex-1 flex flex-col pointer-events-none"><div class="flex justify-between items-start mb-3"><h3 class="text-2xl font-black text-slate-900">${data.place}</h3><span class="bg-slate-100 text-slate-500 text-xs font-bold px-3 py-1 rounded-full whitespace-nowrap ml-2">${dateStr}</span></div><p class="text-slate-600 font-medium leading-relaxed">${data.desc}</p></div>`;
            grid.prepend(card); 
        });
    </script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init();</script>
</body>
</html>
